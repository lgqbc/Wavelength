<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tempo/Pitch Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #131313;
    --panel: #191919;
    --panel-2: #212121;
    --border: #303030;
    --border-lo: #242424;
    --active-border: #565656;
    --led: #ffb454;
    --led-glow: rgba(255,180,84,0.4);
    --sr: #86a3b8;
    --sr-glow: rgba(134,163,184,0.35);
    --text: #ececec;
    --text-muted: #8c8c8c;
    --text-faint: #5e5e5e;
    --danger: #ff7a68;
    --good: #7fd99a;
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    min-height:100vh;
    background: var(--bg);
    color:var(--text);
    font-family:'IBM Plex Sans', sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    padding:40px 16px 60px;
  }

  .unit{
    width:100%;
    max-width:680px;
    background: var(--panel);
    border:1px solid var(--border);
    border-radius:12px;
    padding:24px 24px 22px;
  }

  header{
    position:relative;
    padding-bottom:18px;
    margin-bottom:20px;
    border-bottom:1px solid var(--border-lo);
  }
  .brand{ text-align:center; }
  .brand .eyebrow{
    display:block;
    margin-top:4px;
    font-family:'IBM Plex Mono', monospace;
    font-size:10.5px;
    letter-spacing:0.15em;
    color:var(--text-faint);
    text-transform:uppercase;
  }
  .brand h1{
    margin:0;
    font-size:19px;
    font-weight:600;
    letter-spacing:0.01em;
    color:var(--sr);
  }
  .header-icons{
    position:absolute;
    top:0;
    right:0;
    display:flex;
    gap:6px;
  }
  .icon-btn{
    width:22px;
    height:22px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:none;
    border:1px solid var(--border);
    border-radius:50%;
    color:var(--text-faint);
    cursor:pointer;
    padding:0;
    transition: border-color 120ms ease, color 120ms ease;
  }
  .icon-btn:hover{ border-color:var(--active-border); color:var(--text); }
  .reset-btn.spin svg{ animation: spin-once 400ms ease; }
  @keyframes spin-once{ from{ transform:rotate(0deg); } to{ transform:rotate(-360deg); } }

  section{ margin-bottom:22px; }

  .row-label{
    font-family:'IBM Plex Mono', monospace;
    font-size:10.5px;
    letter-spacing:0.14em;
    color:var(--text-faint);
    text-transform:uppercase;
    margin-bottom:10px;
  }

  /* --- BPM + sample rate + tap --- */
  .bpm-row{ display:flex; align-items:stretch; gap:10px; flex-wrap:wrap; }
  .bpm-field{
    flex:0 0 168px;
    background:var(--panel-2);
    border:1px solid var(--border);
    border-radius:7px;
    display:flex;
    align-items:center;
    padding:0 4px 0 14px;
  }
  .bpm-field input{
    flex:1;
    background:none; border:none; outline:none;
    font-family:'IBM Plex Mono', monospace;
    font-size:24px;
    font-weight:600;
    color:var(--led);
    text-shadow:0 0 8px var(--led-glow);
    padding:11px 0;
    width:100%;
    min-width:0;
  }
  .bpm-field .suffix{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color:var(--text-faint);
    letter-spacing:0.08em;
    padding-right:12px;
  }
  .tap-btn{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    letter-spacing:0.08em;
    font-weight:600;
    color:var(--text-muted);
    background:var(--panel-2);
    border:1px solid var(--border);
    border-radius:7px;
    padding:0 20px;
    cursor:pointer;
    transition: border-color 120ms ease, color 120ms ease;
    text-transform:uppercase;
  }
  .tap-btn:hover{ border-color:var(--active-border); color:var(--text); }
  .tap-btn.flash{ border-color:var(--led); color:var(--led); }
  .lock-btn{
    flex:0 0 38px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--panel-2);
    border:1px solid var(--border);
    border-radius:7px;
    color:var(--text-muted);
    cursor:pointer;
    padding:0;
    transition: border-color 120ms ease, color 120ms ease, background 120ms ease;
  }
  .lock-btn:hover{ border-color:var(--active-border); color:var(--text); }
  .lock-btn.unlocked{
    background:#282828;
    border-color:var(--active-border);
    color:var(--text);
  }

  /* --- division buttons --- */
  .division-grid{
    display:grid;
    grid-template-columns:repeat(8, 1fr);
    gap:6px;
    margin-bottom:8px;
  }
  .div-btn{
    background:var(--panel-2);
    border:1px solid var(--border);
    border-radius:7px;
    padding:8px 2px 6px;
    display:flex; flex-direction:column; align-items:center; gap:5px;
    cursor:pointer;
    color:var(--text-muted);
    transition: border-color 120ms ease, background 120ms ease, color 120ms ease;
  }
  .div-btn svg{ width:15px; height:24px; }
  .div-btn .n{ font-family:'IBM Plex Mono', monospace; font-size:9.5px; }
  .div-btn:hover{ border-color:var(--active-border); }
  .div-btn.active{ border-color:var(--active-border); background:#282828; color:var(--text); }

  .modifier-row{ display:flex; gap:6px; }
  .mod-btn{
    display:flex; align-items:center; justify-content:center;
    width:56px; height:34px;
    color:var(--text-muted);
    background:var(--panel-2);
    border:1px solid var(--border);
    border-radius:7px;
    cursor:pointer;
    opacity:0.55;
    transition: border-color 120ms ease, background 120ms ease, color 120ms ease, opacity 120ms ease;
  }
  .mod-btn svg{ width:26px; height:20px; }
  .mod-btn:hover{ border-color:var(--active-border); }
  .mod-btn.active{ border-color:var(--active-border); background:#282828; color:var(--text); opacity:1; }

  /* --- field readouts --- */
  .field-grid{
    display:grid;
    grid-template-columns:1fr 1fr 1fr 1fr;
    gap:8px;
  }
  .readout{
    background:var(--panel-2);
    border:1px solid var(--border);
    border-radius:8px;
    padding:13px 13px 11px;
    min-width:0;
  }
  .readout .label{
    font-family:'IBM Plex Mono', monospace;
    font-size:10px;
    letter-spacing:0.13em;
    color:var(--text-faint);
    text-transform:uppercase;
    margin-bottom:8px;
  }
  .readout.is-sr .label{ color:var(--sr); }
  .readout .label-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:6px;
    margin-bottom:8px;
  }
  .readout .label-row .label{ margin-bottom:0; }
  .sr-select-inline{
    font-family:'IBM Plex Mono', monospace;
    font-size:10px;
    font-weight:600;
    letter-spacing:0.03em;
    color:var(--sr);
    text-shadow:0 0 5px var(--sr-glow);
    background:none;
    border:none;
    outline:none;
    appearance:none;
    -webkit-appearance:none;
    cursor:pointer;
    padding:2px 13px 2px 0;
    background-image: linear-gradient(45deg, transparent 50%, var(--sr) 50%), linear-gradient(135deg, var(--sr) 50%, transparent 50%);
    background-position: calc(100% - 8px) center, calc(100% - 3.5px) center;
    background-size: 4px 4px, 4px 4px;
    background-repeat: no-repeat;
  }
  .sr-select-inline option{ background:var(--panel-2); color:var(--text); }
  .readout input{
    width:100%;
    background:none;
    border:none;
    outline:none;
    font-family:'IBM Plex Mono', monospace;
    font-weight:600;
    color:var(--led);
    text-shadow:0 0 8px var(--led-glow);
    font-size:20px;
    padding:0;
    min-width:0;
  }
  .readout input.invalid{ color:var(--danger); text-shadow:none; }
  .readout .unit-tag{
    font-family:'IBM Plex Mono', monospace;
    font-size:10px;
    color:var(--text-faint);
    margin-top:6px;
  }
  .readout.is-sr .unit-tag{ color:var(--sr); }
  .readout.is-sr .unit-tag.unit-tag-neutral{ color:var(--text-faint); }
  .readout .cents{
    font-family:'IBM Plex Mono', monospace;
    font-size:10px;
    color:var(--text-muted);
    margin-top:6px;
    min-height:12px;
  }
  .readout .cents.in-tune{ color:var(--good); }

  input:focus-visible, .tap-btn:focus-visible, .div-btn:focus-visible, .mod-btn:focus-visible, select:focus-visible, .reset-btn:focus-visible, .calc-btn:focus-visible, .scratch-toggle:focus-visible, textarea:focus-visible{
    outline:1px solid var(--text-muted);
    outline-offset:2px;
  }

  /* --- piano roll popup --- */
  .readout.has-piano{ position:relative; }
  .piano-roll{
    position:absolute;
    top:calc(100% + 8px);
    left:0;
    z-index:30;
    width:230px;
    max-width:calc(100vw - 64px);
    overflow-x:auto;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:8px;
    padding:8px;
    box-shadow:0 10px 28px rgba(0,0,0,0.5);
  }
  .piano-roll[hidden]{ display:none; }
  .piano-keys{ position:relative; height:56px; }
  .piano-key{
    position:absolute;
    top:0;
    cursor:pointer;
    border-radius:0 0 3px 3px;
    transition: background 100ms ease, border-color 100ms ease;
  }
  .piano-key.white{
    width:15px;
    height:56px;
    background:var(--panel-2);
    border:1px solid var(--border);
    z-index:1;
  }
  .piano-key.black{
    width:9px;
    height:34px;
    background:var(--bg);
    border:1px solid var(--border-lo);
    z-index:2;
  }
  .piano-key:hover{ border-color:var(--active-border); }
  .piano-key.active{
    background:#282828;
    border-color:var(--active-border);
  }
  .piano-key.active.exact{
    background:var(--led);
    border-color:var(--led);
    box-shadow:0 0 8px var(--led-glow);
  }

  /* --- field tips: 3-step guided tour, one spotlight + one docked card --- */
  .tips-overlay{
    position:fixed;
    inset:0;
    z-index:100;
    pointer-events:auto;
  }
  .tips-overlay[hidden]{ display:none; }
  .tips-svg{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    pointer-events:none;
  }
  .tips-outline{ fill:none; stroke:var(--led); stroke-width:1.5; }
  .tips-chips{
    position:fixed;
    inset:0;
    display:flex;
    align-items:flex-end;
    justify-content:center;
    padding:0 16px 22px;
    pointer-events:none;
  }
  .tour-card{
    pointer-events:auto;
    width:min(360px, 100%);
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:14px;
    padding:16px 18px;
    box-shadow:0 14px 34px rgba(0,0,0,0.55);
  }
  .tour-eyebrow{
    display:flex;
    align-items:center;
    justify-content:space-between;
    font-family:'IBM Plex Mono', monospace;
    font-size:10px;
    font-weight:600;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--led);
    margin-bottom:7px;
  }
  .tour-skip{
    background:none;
    border:none;
    color:var(--text-muted);
    font-size:16px;
    line-height:1;
    padding:2px 4px;
    cursor:pointer;
  }
  .tour-skip:hover{ color:#ddd; }
  .tour-title{
    font-family:'IBM Plex Sans', sans-serif;
    font-size:14px;
    font-weight:600;
    color:#eaeaea;
    margin-bottom:5px;
  }
  .tour-text{
    font-family:'IBM Plex Sans', sans-serif;
    font-size:12.5px;
    line-height:1.5;
    color:var(--text-muted);
    margin-bottom:15px;
  }
  .tour-footer{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
  }
  .tour-dots{ display:flex; gap:6px; }
  .tour-dot{ width:6px; height:6px; border-radius:50%; background:var(--border); }
  .tour-dot.active{ background:var(--led); }
  .tour-nav{ display:flex; gap:8px; }
  .tour-btn{
    font-family:'IBM Plex Mono', monospace;
    font-size:10.5px;
    font-weight:600;
    letter-spacing:0.05em;
    text-transform:uppercase;
    padding:7px 13px;
    border-radius:8px;
    border:1px solid var(--border);
    background:var(--panel-2);
    color:var(--text-muted);
    cursor:pointer;
  }
  .tour-btn:hover{ color:#ddd; }
  .tour-btn.primary{
    background:var(--led);
    border-color:var(--led);
    color:#171310;
  }
  .tour-btn.primary:hover{ filter:brightness(1.08); }

  /* --- wave preview: fixed 1s window, cycle count = Hz, no rescaling --- */
  .wave-strip{
    position:relative;
    width:100%;
    height:40px;
    background:var(--panel-2);
    border:1px solid var(--border);
    border-radius:8px;
    overflow:hidden;
  }
  .wave-strip svg{
    display:block;
    width:100%;
    height:100%;
  }
  .wave-hz{
    position:absolute;
    top:6px;
    right:10px;
    font-family:'IBM Plex Mono', monospace;
    font-size:10px;
    letter-spacing:0.04em;
    color:var(--text-faint);
    pointer-events:none;
  }

  /* --- scratchpad: notes + basic calculator, two independent panels --- */
  .scratch-row{
    display:flex;
    align-items:flex-start;
    gap:16px;
    width:100%;
    max-width:680px;
    margin-top:16px;
  }
  .scratch-panel{
    flex:1 1 0;
    min-width:0;
    padding:16px 18px 18px;
  }
  .scratch-panel:not(.open){ cursor:pointer; }
  .scratch-toggle{
    width:100%;
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:none;
    border:none;
    padding:0;
    margin:0;
    cursor:pointer;
    font-family:'IBM Plex Mono', monospace;
    font-size:10.5px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--text-faint);
    transition: color 120ms ease;
  }
  .scratch-toggle:hover{ color:var(--text-muted); }
  .scratch-toggle svg{ transition: transform 160ms ease; }
  .scratch-panel.open .scratch-toggle svg{ transform:rotate(180deg); }

  .scratch-body{ margin-top:16px; }

  .calc-history{
    display:flex;
    flex-direction:column;
    gap:2px;
    margin-bottom:6px;
  }
  .calc-history:empty{ margin-bottom:0; }
  .calc-row{
    text-align:right;
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    color:var(--text-muted);
    padding:1px 2px;
    cursor:text;
    user-select:text;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .calc-display-row{ position:relative; margin-bottom:8px; }
  .calc-display{
    width:100%;
    background:var(--panel-2);
    border:1px solid var(--border);
    border-radius:8px;
    padding:10px 34px 10px 12px;
    text-align:right;
    font-family:'IBM Plex Mono', monospace;
    font-weight:600;
    font-size:22px;
    color:var(--led);
    text-shadow:0 0 8px var(--led-glow);
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .calc-clear{
    position:absolute;
    top:50%;
    right:6px;
    transform:translateY(-50%);
    font-family:'IBM Plex Mono', monospace;
    font-size:9.5px;
    font-weight:600;
  }

  .calc-ops{
    display:grid;
    grid-template-columns:repeat(5, 1fr);
    gap:6px;
  }
  .calc-btn{
    background:var(--panel-2);
    border:1px solid var(--border);
    border-radius:7px;
    padding:10px 0;
    font-family:'IBM Plex Mono', monospace;
    font-size:14px;
    color:var(--text);
    cursor:pointer;
    transition: border-color 120ms ease, background 120ms ease, color 120ms ease;
  }
  .calc-btn:hover{ border-color:var(--active-border); }
  .calc-btn.calc-op{ color:var(--sr); }
  .calc-btn.calc-eq{
    background:var(--led);
    border-color:var(--led);
    color:#171310;
    font-weight:600;
  }
  .calc-btn.calc-eq:hover{ filter:brightness(1.08); }

  .notes-field{
    display:block;
    width:100%;
    background:var(--panel-2);
    border:1px solid var(--border);
    border-radius:8px;
    padding:8px 10px;
    font-family:'IBM Plex Sans', sans-serif;
    font-size:12px;
    color:var(--text-muted);
    resize:vertical;
    min-height:118px;
  }
  .notes-field:focus{ outline:1px solid var(--text-muted); outline-offset:1px; color:var(--text); }

  @media (max-width:560px){
    .scratch-row{ flex-direction:column; }
    .field-grid{ grid-template-columns:1fr 1fr; }
    .division-grid{ grid-template-columns:repeat(4,1fr); }
    .readout input{ font-size:22px; }
  }
</style>
</head>
<body>

<div class="unit">
  <header>
    <div class="header-icons">
      <button class="icon-btn" id="tipsBtn" aria-label="Show field tips" title="Show field tips">
        <svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="8" cy="8" r="6.2"/>
          <line x1="8" y1="7.2" x2="8" y2="11.3"/>
          <circle cx="8" cy="4.9" r="0.15" fill="currentColor" stroke-width="1.9"/>
        </svg>
      </button>
      <button class="icon-btn reset-btn" id="resetBtn" aria-label="Reset to defaults" title="Reset to defaults">
        <svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M13.5 8A5.5 5.5 0 1 1 11.8 4"/>
          <path d="M13.5 2.3v3.7h-3.7"/>
        </svg>
      </button>
    </div>
    <div class="brand">
      <h1>Musical Calculator</h1>
      <span class="eyebrow">BPM · MS · HZ · NOTES · SAMPLES</span>
    </div>
  </header>

  <section>
    <div class="row-label">Tempo</div>
    <div class="bpm-row">
      <button class="lock-btn" id="bpmLockBtn" aria-pressed="true">
        <svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="7.2" width="8" height="7" rx="1.2"/><path d="M6 7.2V5.2a2 2 0 0 1 4 0v2"/></svg>
      </button>
      <div class="bpm-field">
        <input type="text" inputmode="decimal" id="bpmInput" value="120" aria-label="BPM">
        <span class="suffix">BPM</span>
      </div>
      <button class="tap-btn" id="tapBtn">Tap</button>
    </div>
  </section>

  <section>
    <div class="division-grid" id="divisionGrid"></div>
    <div class="modifier-row" id="modifierRow">
      <button class="mod-btn" data-mod="dotted" aria-label="Dotted" title="Dotted">
        <svg viewBox="0 0 26 20" aria-hidden="true">
          <ellipse cx="6" cy="15" rx="4.2" ry="3.1" fill="currentColor" opacity="0.7"/>
          <line x1="9.6" y1="15" x2="9.6" y2="2" stroke="currentColor" stroke-width="1.6" opacity="0.7"/>
          <circle cx="16" cy="15" r="2.1" fill="currentColor"/>
        </svg>
      </button>
      <button class="mod-btn" data-mod="triplet" aria-label="Triplet" title="Triplet">
        <svg viewBox="0 0 26 20" aria-hidden="true">
          <g transform="translate(0,2)">
            <path d="M2 10 L2 5 L9 5" fill="none" stroke="currentColor" stroke-width="1.4"/>
            <path d="M17 5 L24 5 L24 10" fill="none" stroke="currentColor" stroke-width="1.4"/>
            <text x="13" y="9.5" font-size="10" text-anchor="middle" fill="currentColor" font-family="IBM Plex Mono, monospace">3</text>
          </g>
        </svg>
      </button>
    </div>
  </section>

  <section style="margin-bottom:6px;">
    <div class="row-label">Conversion</div>
    <div class="field-grid">
      <div class="readout">
        <div class="label">Milliseconds</div>
        <input type="text" inputmode="decimal" id="msInput" aria-label="Milliseconds">
        <div class="unit-tag">ms</div>
      </div>
      <div class="readout">
        <div class="label">Frequency</div>
        <input type="text" inputmode="decimal" id="hzInput" aria-label="Hertz">
        <div class="unit-tag">Hz</div>
      </div>
      <div class="readout is-sr has-piano" id="noteReadout">
        <div class="label-row">
          <div class="label">Note</div>
          <select id="a4Select" class="sr-select-inline" aria-label="A4 reference pitch">
            <option value="415">415</option>
            <option value="432">432</option>
            <option value="440" selected>440</option>
            <option value="442">442</option>
            <option value="443">443</option>
            <option value="444">444</option>
            <option value="445">445</option>
          </select>
        </div>
        <input type="text" id="noteInput" aria-label="Note" placeholder="e.g. A4" autocomplete="off">
        <div class="cents" id="centsOut"></div>
        <div class="piano-roll" id="pianoRoll" hidden>
          <div class="piano-keys" id="pianoKeys"></div>
        </div>
      </div>
      <div class="readout is-sr">
        <div class="label-row">
          <div class="label">Samples</div>
          <select id="sampleRateSelect" class="sr-select-inline" aria-label="Sample rate">
            <option value="44100">44.1k</option>
            <option value="48000" selected>48k</option>
            <option value="88200">88.2k</option>
            <option value="96000">96k</option>
            <option value="176400">176.4k</option>
            <option value="192000">192k</option>
          </select>
        </div>
        <input type="text" inputmode="decimal" id="samplesInput" aria-label="Samples">
        <div class="unit-tag unit-tag-neutral">smp</div>
      </div>
    </div>
  </section>

  <section style="margin-bottom:0; margin-top:24px;">
    <div class="wave-strip">
      <svg id="waveSvg" viewBox="0 0 600 46" preserveAspectRatio="none" aria-hidden="true">
        <path id="wavePath" fill="none" stroke="var(--text-muted)" stroke-width="1.4" stroke-opacity="0.55" vector-effect="non-scaling-stroke"/>
      </svg>
      <div class="wave-hz" id="waveHzLabel"></div>
    </div>
  </section>
</div>

<div class="scratch-row">
  <div class="unit scratch-panel" id="notesUnit">
    <button class="scratch-toggle" id="notesToggle" aria-expanded="false" aria-controls="notesBody">
      <span>Notes</span>
      <svg viewBox="0 0 16 16" width="10" height="10" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M4 6l4 4 4-4"/>
      </svg>
    </button>
    <div class="scratch-body" id="notesBody" hidden>
      <textarea class="notes-field" id="notesField" placeholder="Notes" rows="6"></textarea>
    </div>
  </div>

  <div class="unit scratch-panel" id="calcUnit">
    <button class="scratch-toggle" id="calcToggle" aria-expanded="false" aria-controls="calcBody">
      <span>Basic calculator</span>
      <svg viewBox="0 0 16 16" width="10" height="10" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M4 6l4 4 4-4"/>
      </svg>
    </button>
    <div class="scratch-body" id="calcBody" hidden>
      <div class="calc-history" id="calcHistory"></div>
      <div class="calc-display-row">
        <input class="calc-display" id="calcDisplay" type="text" inputmode="decimal" autocomplete="off" spellcheck="false" value="0" />
        <button class="icon-btn calc-clear" id="calcClearBtn" aria-label="Clear" title="Clear">C</button>
      </div>
      <div class="calc-ops" id="calcOps">
        <button class="calc-btn calc-op" data-k="/">÷</button>
        <button class="calc-btn calc-op" data-k="*">×</button>
        <button class="calc-btn calc-op" data-k="-">−</button>
        <button class="calc-btn calc-op" data-k="+">+</button>
        <button class="calc-btn calc-eq" data-k="=">=</button>
      </div>
    </div>
  </div>

<div class="tips-overlay" id="tipsOverlay" hidden>
  <svg class="tips-svg" id="tipsSvg" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <mask id="tipsMask" maskUnits="userSpaceOnUse" x="0" y="0" width="100%" height="100%">
        <rect id="tipsMaskBase" x="0" y="0" width="0" height="0" fill="white"/>
        <g id="tipsMaskHoles"></g>
      </mask>
    </defs>
    <rect id="tipsBackdropRect" x="0" y="0" width="0" height="0" fill="rgba(0,0,0,0.74)" mask="url(#tipsMask)"/>
    <g id="tipsOutlines"></g>
  </svg>
  <div class="tips-chips" id="tipsChips"></div>
</div>

<script>
(function(){
  const STEM_X = 12.6;
  const FLAG_GAP = 4.4;
  function flagPath(yStart){
    const yEnd = yStart + 7.2;
    const cx = STEM_X + 4.6;
    return `<path d="M${STEM_X} ${yStart} C${cx} ${yStart+2.3} ${cx} ${yStart+4.9} ${STEM_X} ${yEnd}" fill="none" stroke="currentColor" stroke-width="1.7"/>`;
  }
  function noteIcon(n){
    const filled = n >= 4;
    const hasStem = n >= 2;
    const flagCount = n >= 8 ? Math.round(Math.log2(n/4)) : 0;
    let s = `<svg viewBox="0 0 19 31">`;
    s += `<ellipse cx="7" cy="27" rx="5.6" ry="3.7" ${filled ? 'fill="currentColor"' : 'fill="none" stroke="currentColor" stroke-width="1.7"'}/>`;
    if(hasStem){
      s += `<line x1="${STEM_X}" y1="27" x2="${STEM_X}" y2="2" stroke="currentColor" stroke-width="1.7"/>`;
      for(let i=0;i<flagCount;i++){ s += flagPath(2 + i*FLAG_GAP); }
    }
    s += `</svg>`;
    return s;
  }
  const DIVISIONS = [
    {n:1, label:'Whole'}, {n:2, label:'Half'}, {n:4, label:'Quarter'},
    {n:8, label:'8th'}, {n:16, label:'16th'}, {n:32, label:'32nd'},
    {n:64, label:'64th'}, {n:128, label:'128th'}
  ];
  const MOD_FACTOR = { straight:1, dotted:1.5, triplet:2/3 };
  const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  const BLACK_PCS = [1,3,6,8,10];
  const PIANO_LOW = 36;  // C2
  const PIANO_HIGH = 96; // C7
  const PIANO_WHITE_W = 15;
  let a4 = 440;

  const bpmInput = document.getElementById('bpmInput');
  const msInput = document.getElementById('msInput');
  const hzInput = document.getElementById('hzInput');
  const noteInput = document.getElementById('noteInput');
  const samplesInput = document.getElementById('samplesInput');
  const sampleRateSelect = document.getElementById('sampleRateSelect');
  const a4Select = document.getElementById('a4Select');
  const resetBtn = document.getElementById('resetBtn');
  const bpmLockBtn = document.getElementById('bpmLockBtn');
  const pianoRoll = document.getElementById('pianoRoll');
  const pianoKeys = document.getElementById('pianoKeys');
  const centsOut = document.getElementById('centsOut');
  const tapBtn = document.getElementById('tapBtn');
  const wavePath = document.getElementById('wavePath');
  const waveHzLabel = document.getElementById('waveHzLabel');
  const divisionGrid = document.getElementById('divisionGrid');
  const modifierRow = document.getElementById('modifierRow');

  let bpm = 120;
  let sampleRate = 48000;
  let currentMs = null;
  let bpmLocked = true; // locked (default) = BPM fixed, division clicks recalculate ms — today's behavior

  const LOCK_CLOSED_SVG = '<svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="7.2" width="8" height="7" rx="1.2"/><path d="M6 7.2V5.2a2 2 0 0 1 4 0v2"/></svg>';
  const LOCK_OPEN_SVG = '<svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="7.2" width="8" height="7" rx="1.2"/><path d="M6 7.2V5.2a2 2 0 0 1 4-1.4"/></svg>';
  function renderLockBtn(){
    bpmLockBtn.innerHTML = bpmLocked ? LOCK_CLOSED_SVG : LOCK_OPEN_SVG;
    bpmLockBtn.classList.toggle('unlocked', !bpmLocked);
    bpmLockBtn.setAttribute('aria-pressed', String(!bpmLocked));
    const label = bpmLocked
      ? 'BPM locked. Clicking a division recalculates ms, Hz, note and samples.'
      : 'BPM unlocked. Clicking a division recalculates BPM to match the current value.';
    bpmLockBtn.title = label;
    bpmLockBtn.setAttribute('aria-label', label);
  }
  renderLockBtn();
  bpmLockBtn.addEventListener('click', ()=>{
    bpmLocked = !bpmLocked;
    renderLockBtn();
    saveState();
  });
  function applyDivision(n, mod){
    if(bpmLocked){
      pushMs(msFromTempo(bpm, n, mod));
    }else{
      // BPM unlocked: solve BPM so the CURRENT ms exactly matches this
      // division/modifier instead — ms stays put, BPM moves to fit it.
      if(currentMs===null) return;
      const solved = (240000 * MOD_FACTOR[mod]) / (currentMs * n);
      if(!(solved>0) || !isFinite(solved)) return;
      bpm = solved;
      bpmInput.value = round(solved, 2);
      updateDivisionHighlight(currentMs);
      saveState();
    }
  }

  // build division buttons
  DIVISIONS.forEach(d=>{
    const btn = document.createElement('button');
    btn.className = 'div-btn';
    btn.dataset.n = d.n;
    btn.innerHTML = noteIcon(d.n) + `<span class="n">1/${d.n}</span>`;
    btn.setAttribute('aria-label', d.label + ' note');
    btn.addEventListener('click', ()=>{
      const mod = currentModifier() || 'straight';
      applyDivision(d.n, mod);
    });
    divisionGrid.appendChild(btn);
  });

  function currentModifier(){
    const active = [...modifierRow.children].find(b=>b.classList.contains('active'));
    return active ? active.dataset.mod : null;
  }
  function currentDivision(){
    const active = [...divisionGrid.children].find(b=>b.classList.contains('active'));
    return active ? Number(active.dataset.n) : null;
  }

  modifierRow.addEventListener('click', (e)=>{
    const btn = e.target.closest('.mod-btn');
    if(!btn) return;
    const n = currentDivision() || 4;
    const isActive = btn.classList.contains('active');
    applyDivision(n, isActive ? 'straight' : btn.dataset.mod);
  });

  // ---- piano roll (note field popup) ----
  const pianoKeyEls = new Map(); // midi -> element
  (function buildPiano(){
    let whiteIndex = 0;
    const whiteEls = [];
    const blackEls = [];
    for(let m=PIANO_LOW; m<=PIANO_HIGH; m++){
      const pc = ((m%12)+12)%12;
      const isBlack = BLACK_PCS.includes(pc);
      const el = document.createElement('div');
      el.className = 'piano-key ' + (isBlack ? 'black' : 'white');
      el.dataset.midi = m;
      el.setAttribute('role','button');
      el.setAttribute('tabindex','-1');
      if(isBlack){
        el.style.left = (whiteIndex*PIANO_WHITE_W - 4.5) + 'px';
        blackEls.push(el);
      }else{
        el.style.left = (whiteIndex*PIANO_WHITE_W) + 'px';
        whiteIndex++;
        whiteEls.push(el);
      }
      pianoKeyEls.set(m, el);
    }
    whiteEls.forEach(el=>pianoKeys.appendChild(el));
    blackEls.forEach(el=>pianoKeys.appendChild(el));
    pianoKeys.style.width = (whiteIndex*PIANO_WHITE_W) + 'px';
  })();

  pianoRoll.addEventListener('mousedown', (e)=>{
    // keep focus on the text field so the popup doesn't close on click
    e.preventDefault();
  });
  pianoRoll.addEventListener('click', (e)=>{
    const el = e.target.closest('.piano-key');
    if(!el) return;
    const midi = Number(el.dataset.midi);
    pushMs(msFromHz(hzFromMidi(midi)), 'note');
    noteInput.value = noteNameFromMidiRound(midi);
    noteInput.classList.remove('invalid');
  });
  function currentRoundedMidi(){
    if(currentMs===null) return null;
    return pitchInfo(hzFromMs(currentMs)).rounded;
  }
  function updatePianoActive(){
    let rounded = null, cents = 0;
    if(currentMs!==null){
      const info = pitchInfo(hzFromMs(currentMs));
      rounded = info.rounded; cents = info.cents;
    }
    pianoKeyEls.forEach((el, m)=>{
      const isActive = m === rounded;
      el.classList.toggle('active', isActive);
      el.classList.toggle('exact', isActive && cents === 0);
    });
  }
  function scrollPianoIntoView(){
    const midi = currentRoundedMidi();
    const el = midi!==null ? pianoKeyEls.get(midi) : null;
    if(el) pianoRoll.scrollLeft = Math.max(0, el.offsetLeft - pianoRoll.clientWidth/2 + el.offsetWidth/2);
  }
  noteInput.addEventListener('focus', ()=>{
    pianoRoll.hidden = false;
    scrollPianoIntoView();
  });
  noteInput.addEventListener('blur', ()=>{ pianoRoll.hidden = true; });
  noteInput.addEventListener('keydown', (e)=>{
    if(e.key === 'Escape') noteInput.blur();
  });

  // ---- math ----
  function msFromTempo(bpm, n, mod){
    return (60000/bpm) * (4/n) * MOD_FACTOR[mod];
  }
  function hzFromMs(ms){ return 1000/ms; }
  function msFromHz(hz){ return 1000/hz; }
  function samplesFromMs(ms, sr){ return ms/1000*sr; }
  function msFromSamples(samples, sr){ return samples/sr*1000; }

  // ---- persistence: remembers last bpm / sample rate / A4 / value ----
  const STORAGE_KEY = 'musical-calc-state';
  let saveTimer = null;
  function saveState(){
    clearTimeout(saveTimer);
    saveTimer = setTimeout(async ()=>{
      const payload = JSON.stringify({ bpm, sampleRate, a4, ms: currentMs, bpmLocked });
      try{
        if(window.storage){ await window.storage.set(STORAGE_KEY, payload); }
        else{ localStorage.setItem(STORAGE_KEY, payload); }
      }catch(e){ /* storage unavailable — fail silently, no persistence this session */ }
    }, 300);
  }
  async function loadState(){
    try{
      if(window.storage){
        const res = await window.storage.get(STORAGE_KEY);
        return res ? JSON.parse(res.value) : null;
      }
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : null;
    }catch(e){ return null; }
  }
  function midiFromHz(hz){ return 69 + 12*Math.log2(hz/a4); }
  function hzFromMidi(midi){ return a4 * Math.pow(2, (midi-69)/12); }
  function noteNameFromMidiRound(m){
    const name = NOTE_NAMES[((m%12)+12)%12];
    const octave = Math.floor(m/12) - 1;
    return name + octave;
  }
  function parseNote(str){
    const m = str.trim().match(/^([A-Ga-g])(#|b)?(-?\d+)$/);
    if(!m) return null;
    let idx = NOTE_NAMES.findIndex(n => n[0] === m[1].toUpperCase());
    if(m[2] === '#') idx += 1;
    if(m[2] === 'b') idx -= 1;
    idx = ((idx%12)+12)%12;
    const octave = parseInt(m[3], 10);
    return (octave+1)*12 + idx;
  }
  function isCloseEnough(a, b){
    return Math.abs(a-b) <= 1e-6 * Math.max(Math.abs(a), Math.abs(b), 1);
  }
  function exactDivisionMatch(ms, bpm){
    // Only ever matches a division/modifier if it's an exact hit at the
    // CURRENT bpm — no implied-bpm search, no "closest" fallback.
    let match = null;
    DIVISIONS.forEach(d=>{
      Object.keys(MOD_FACTOR).forEach(mod=>{
        const expected = msFromTempo(bpm, d.n, mod);
        if(isCloseEnough(expected, ms)) match = { n:d.n, mod };
      });
    });
    return match;
  }

  function round(v, d){
    const f = Math.pow(10,d);
    return Math.round(v*f)/f;
  }

  // ---- render ----
  function setMsField(ms){ msInput.value = round(ms, ms<10?3:2); }
  function setHzField(hz){ hzInput.value = round(hz, hz<10?3:2); }
  function pitchInfo(hz){
    const midi = midiFromHz(hz);
    const rounded = Math.round(midi);
    const cents = Math.round((midi - rounded) * 100);
    return { rounded, cents };
  }
  function updateCents(hz){
    const { rounded, cents } = pitchInfo(hz);
    centsOut.classList.toggle('in-tune', cents===0);
    centsOut.textContent = (cents===0) ? '±0¢' : (cents>0? `+${cents}¢` : `${cents}¢`);
    return rounded;
  }
  function setNoteField(hz){
    noteInput.value = noteNameFromMidiRound(updateCents(hz));
  }
  function updateDivisionHighlight(ms){
    const match = exactDivisionMatch(ms, bpm);
    [...divisionGrid.children].forEach(b=>{
      b.classList.toggle('active', !!match && Number(b.dataset.n) === match.n);
    });
    [...modifierRow.children].forEach(b=>{
      b.classList.toggle('active', !!match && b.dataset.mod === match.mod);
    });
  }

  function setSamplesField(ms){ samplesInput.value = Math.round(samplesFromMs(ms, sampleRate)); }

  // ---- wave preview: literal 1-second window, cycle count = Hz, no rescaling ----
  // Deliberately not normalized to fit the strip — a slow rate genuinely looks
  // like a near-flat line, a fast rate genuinely looks like a dense blur. That's
  // the point: the width always represents exactly one real second.
  const WAVE_VB_W = 600, WAVE_VB_H = 46;
  const WAVE_SAMPLES = 1500; // dense enough that fast rates read as a blur, not aliasing
  function updateWave(hz){
    if(!(hz>0) || !isFinite(hz)){
      wavePath.setAttribute('d', '');
      waveHzLabel.textContent = '';
      return;
    }
    const midY = WAVE_VB_H/2;
    const amp = WAVE_VB_H/2 - 5;
    let d = '';
    for(let i=0;i<=WAVE_SAMPLES;i++){
      const t = i/WAVE_SAMPLES; // 0..1, representing 0..1 real second
      const x = t * WAVE_VB_W;
      const y = midY - Math.sin(2*Math.PI*hz*t) * amp;
      d += (i===0 ? 'M' : 'L') + x.toFixed(2) + ' ' + y.toFixed(2) + ' ';
    }
    wavePath.setAttribute('d', d.trim());
    waveHzLabel.textContent = (hz>=100 ? hz.toFixed(0) : hz>=10 ? hz.toFixed(1) : hz.toFixed(2)) + ' Hz';
  }

  function pushMs(ms, skip){
    if(!(ms>0) || !isFinite(ms)) return;
    currentMs = ms;
    if(skip!=='ms') setMsField(ms);
    const hz = hzFromMs(ms);
    if(skip!=='hz') setHzField(hz);
    if(skip!=='note') setNoteField(hz); else updateCents(hz);
    if(skip!=='samples') setSamplesField(ms);
    updateWave(hz);
    updateDivisionHighlight(ms);
    updatePianoActive();
    saveState();
  }

  // ---- field listeners ----

  // Small recursive-descent evaluator for typing basic expressions directly
  // into numeric fields (e.g. "120/2" -> 60). Supports + - * / ^ ( ) with
  // standard precedence, unary +/-, and decimals. No eval(), so it can only
  // ever produce a number or NaN — nothing else.
  function evalMathExpression(str){
    str = str.trim();
    if(!str) return NaN;
    let i = 0;
    function skipWs(){ while(str[i] === ' ') i++; }
    function parseNumber(){
      skipWs();
      const start = i;
      let hasDigits = false;
      while(i < str.length && /[0-9]/.test(str[i])){ i++; hasDigits = true; }
      if(str[i] === '.'){ i++; while(i < str.length && /[0-9]/.test(str[i])){ i++; hasDigits = true; } }
      if(!hasDigits) throw new Error('bad number');
      return parseFloat(str.slice(start, i));
    }
    function parseAtom(){
      skipWs();
      if(str[i] === '('){
        i++;
        const v = parseExpr();
        skipWs();
        if(str[i] !== ')') throw new Error('unmatched paren');
        i++;
        return v;
      }
      if(str[i] === '-'){ i++; return -parseAtom(); }
      if(str[i] === '+'){ i++; return parseAtom(); }
      return parseNumber();
    }
    function parsePow(){
      const base = parseAtom();
      skipWs();
      if(str[i] === '^'){ i++; return Math.pow(base, parsePow()); }
      return base;
    }
    function parseTerm(){
      let v = parsePow();
      skipWs();
      while(str[i] === '*' || str[i] === '/'){
        const op = str[i]; i++;
        const rhs = parsePow();
        v = op === '*' ? v * rhs : v / rhs;
        skipWs();
      }
      return v;
    }
    function parseExpr(){
      let v = parseTerm();
      skipWs();
      while(str[i] === '+' || str[i] === '-'){
        const op = str[i]; i++;
        const rhs = parseTerm();
        v = op === '+' ? v + rhs : v - rhs;
        skipWs();
      }
      return v;
    }
    try{
      const result = parseExpr();
      skipWs();
      if(i !== str.length) return NaN;
      return result;
    }catch(e){ return NaN; }
  }

  // Wire expression evaluation onto a numeric field: when the field is
  // committed (blur, or Enter) and its raw text contains an operator, replace
  // it with the computed result and let the field's normal 'input' handling
  // pick that up as usual.
  function enableExpressionEval(inputEl){
    function commit(){
      const raw = inputEl.value;
      if(!/[+\-*/^()]/.test(raw)) return;
      const result = evalMathExpression(raw);
      if(isFinite(result)){
        const rounded = Math.round(result * 1e9) / 1e9;
        inputEl.value = String(rounded);
        inputEl.dispatchEvent(new Event('input', { bubbles:true }));
      }
    }
    inputEl.addEventListener('blur', commit);
    inputEl.addEventListener('keydown', (e)=>{
      if(e.key === 'Enter'){ commit(); inputEl.blur(); }
    });
  }
  [bpmInput, msInput, hzInput, samplesInput].forEach(enableExpressionEval);

  bpmInput.addEventListener('input', ()=>{
    const v = parseFloat(bpmInput.value);
    if(v>0 && isFinite(v)){
      bpm = v;
      const n = currentDivision() || 4;
      const mod = currentModifier() || 'straight';
      pushMs(msFromTempo(bpm, n, mod));
    }
  });

  msInput.addEventListener('input', ()=>{
    const v = parseFloat(msInput.value);
    msInput.classList.toggle('invalid', !(v>0));
    if(v>0) pushMs(v, 'ms');
  });

  hzInput.addEventListener('input', ()=>{
    const v = parseFloat(hzInput.value);
    hzInput.classList.toggle('invalid', !(v>0));
    if(v>0) pushMs(msFromHz(v), 'hz');
  });

  noteInput.addEventListener('input', ()=>{
    const midi = parseNote(noteInput.value);
    noteInput.classList.toggle('invalid', midi===null);
    if(midi!==null) pushMs(msFromHz(hzFromMidi(midi)), 'note');
  });

  samplesInput.addEventListener('input', ()=>{
    const v = parseFloat(samplesInput.value);
    samplesInput.classList.toggle('invalid', !(v>0));
    if(v>0) pushMs(msFromSamples(v, sampleRate), 'samples');
  });

  sampleRateSelect.addEventListener('change', ()=>{
    sampleRate = parseInt(sampleRateSelect.value, 10);
    // Sample rate only affects how the samples field reads out —
    // it does not change ms/Hz/note/BPM.
    if(currentMs!==null) setSamplesField(currentMs);
    saveState();
  });

  a4Select.addEventListener('change', ()=>{
    a4 = parseInt(a4Select.value, 10);
    // A4 reference only affects how the note field reads out —
    // it does not change ms/Hz/samples/BPM.
    if(currentMs!==null){
      setNoteField(hzFromMs(currentMs));
      updatePianoActive();
    }
    saveState();
  });

  // ---- reset to defaults ----
  const DEFAULTS = { bpm:120, sampleRate:48000, a4:440, bpmLocked:true };
  resetBtn.addEventListener('click', ()=>{
    bpm = DEFAULTS.bpm;
    sampleRate = DEFAULTS.sampleRate;
    a4 = DEFAULTS.a4;
    bpmLocked = DEFAULTS.bpmLocked;
    bpmInput.value = bpm;
    sampleRateSelect.value = String(sampleRate);
    a4Select.value = String(a4);
    renderLockBtn();
    [msInput, hzInput, noteInput, samplesInput].forEach(el=>el.classList.remove('invalid'));
    resetBtn.classList.remove('spin'); void resetBtn.offsetWidth; resetBtn.classList.add('spin');
    pushMs(msFromTempo(bpm, 4, 'straight'));
  });

  // ---- tap tempo ----
  let taps = [];
  tapBtn.addEventListener('click', ()=>{
    const now = performance.now();
    if(taps.length && now - taps[taps.length-1] > 2000) taps = [];
    taps.push(now);
    if(taps.length > 6) taps.shift();
    tapBtn.classList.add('flash');
    setTimeout(()=>tapBtn.classList.remove('flash'), 120);
    if(taps.length >= 2){
      const intervals = [];
      for(let i=1;i<taps.length;i++) intervals.push(taps[i]-taps[i-1]);
      const avg = intervals.reduce((a,b)=>a+b,0)/intervals.length;
      bpm = Math.round(60000/avg);
      bpmInput.value = bpm;
      const n = currentDivision() || 4;
      const mod = currentModifier() || 'straight';
      pushMs(msFromTempo(bpm, n, mod));
    }
  });

  // ---- field tips: 3-step guided tour (tempo -> division -> conversion) ----
  const tipsBtn = document.getElementById('tipsBtn');
  const tipsOverlay = document.getElementById('tipsOverlay');
  const tipsMaskBase = document.getElementById('tipsMaskBase');
  const tipsMaskHoles = document.getElementById('tipsMaskHoles');
  const tipsBackdropRect = document.getElementById('tipsBackdropRect');
  const tipsOutlines = document.getElementById('tipsOutlines');
  const tipsSvg = document.getElementById('tipsSvg');
  const tipsChips = document.getElementById('tipsChips');
  const TIPS_SEEN_KEY = 'musical-calc-tips-seen';
  const SVGNS = 'http://www.w3.org/2000/svg';

  // Mirrors the app's actual workflow: set tempo -> pick a division -> read the synced conversion.
  const TOUR = [
    { targets:['.bpm-row'],
      title:'Set your tempo',
      text:'Type a BPM, tap it in, or lock it. Locked keeps BPM fixed and solves ms. Unlocked, a division solves BPM instead.' },
    { targets:['#divisionGrid', '#modifierRow'],
      title:'Pick a note division',
      text:'Choose a note length, then straight, dotted, or triplet. It turns amber on an exact match at this tempo.' },
    { targets:['.field-grid'],
      title:'Read the conversion',
      text:'ms, Hz, Note, and Samples all stay in sync. Edit any one and the rest follow.' },
    { targets:['.scratch-row'],
      title:'Notes & calculator',
      text:'Two collapsible panels for scratch space. Every field above does quick math too, like typing 120/2 into BPM and hitting Enter.' },
  ];
  let tourStep = 0;

  function svgEl(tag, attrs){
    const el = document.createElementNS(SVGNS, tag);
    for(const k in attrs) el.setAttribute(k, attrs[k]);
    return el;
  }
  function clearTips(){
    tipsMaskHoles.innerHTML = '';
    tipsOutlines.innerHTML = '';
    tipsChips.innerHTML = '';
  }
  function sizeSvg(){
    const vw = window.innerWidth, vh = window.innerHeight;
    tipsSvg.setAttribute('width', vw);
    tipsSvg.setAttribute('height', vh);
    tipsMaskBase.setAttribute('width', vw);
    tipsMaskBase.setAttribute('height', vh);
    tipsBackdropRect.setAttribute('width', vw);
    tipsBackdropRect.setAttribute('height', vh);
  }
  function highlightTargets(selectors){
    const pad = 6;
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    selectors.forEach(sel=>{
      const target = document.querySelector(sel);
      if(!target) return;
      const r = target.getBoundingClientRect();
      minX = Math.min(minX, r.left);
      minY = Math.min(minY, r.top);
      maxX = Math.max(maxX, r.right);
      maxY = Math.max(maxY, r.bottom);
    });
    if(!isFinite(minX)) return;
    const hx = minX-pad, hy = minY-pad, hw = (maxX-minX)+pad*2, hh = (maxY-minY)+pad*2;
    tipsMaskHoles.appendChild(svgEl('rect', { x:hx, y:hy, width:hw, height:hh, rx:8, fill:'black' }));
    tipsOutlines.appendChild(svgEl('rect', { x:hx, y:hy, width:hw, height:hh, rx:8, class:'tips-outline' }));
  }
  function renderStep(){
    clearTips();
    sizeSvg();
    const step = TOUR[tourStep];
    const firstTarget = document.querySelector(step.targets[0]);
    if(firstTarget){
      const r = firstTarget.getBoundingClientRect();
      const fullyVisible = r.top >= 0 && r.bottom <= window.innerHeight;
      if(!fullyVisible) firstTarget.scrollIntoView({ block:'center' });
    }
    highlightTargets(step.targets);

    const card = document.createElement('div');
    card.className = 'tour-card';
    card.innerHTML = `
      <div class="tour-eyebrow">
        <span>Step ${tourStep+1} of ${TOUR.length}</span>
        <button class="tour-skip" id="tourSkip" aria-label="Skip tour">&times;</button>
      </div>
      <div class="tour-title">${step.title}</div>
      <div class="tour-text">${step.text}</div>
      <div class="tour-footer">
        <div class="tour-dots">${TOUR.map((_,i)=>`<span class="tour-dot${i===tourStep?' active':''}"></span>`).join('')}</div>
        <div class="tour-nav">
          ${tourStep>0 ? '<button class="tour-btn" id="tourBack">Back</button>' : ''}
          <button class="tour-btn primary" id="tourNext">${tourStep===TOUR.length-1?'Done':'Next'}</button>
        </div>
      </div>`;
    tipsChips.appendChild(card);

    document.getElementById('tourSkip').addEventListener('click', hideTips);
    const backBtn = document.getElementById('tourBack');
    if(backBtn) backBtn.addEventListener('click', ()=>{ tourStep--; renderStep(); });
    document.getElementById('tourNext').addEventListener('click', ()=>{
      if(tourStep === TOUR.length-1){ hideTips(); } else { tourStep++; renderStep(); }
    });
  }
  function showTips(){
    tourStep = 0;
    tipsOverlay.hidden = false;
    renderStep();
    markTipsSeen();
  }
  function hideTips(){
    tipsOverlay.hidden = true;
    clearTips();
  }
  async function markTipsSeen(){
    try{
      if(window.storage){ await window.storage.set(TIPS_SEEN_KEY, '1'); }
      else{ localStorage.setItem(TIPS_SEEN_KEY, '1'); }
    }catch(e){ /* ignore */ }
  }
  async function hasTipsSeen(){
    try{
      if(window.storage){ return !!(await window.storage.get(TIPS_SEEN_KEY)); }
      return !!localStorage.getItem(TIPS_SEEN_KEY);
    }catch(e){ return false; }
  }

  tipsBtn.addEventListener('click', showTips);
  tipsOverlay.addEventListener('click', (e)=>{ if(e.target === tipsOverlay) hideTips(); });
  document.addEventListener('keydown', (e)=>{
    if(tipsOverlay.hidden) return;
    if(e.key === 'Escape') hideTips();
    if(e.key === 'ArrowRight') document.getElementById('tourNext')?.click();
    if(e.key === 'ArrowLeft') document.getElementById('tourBack')?.click();
  });
  window.addEventListener('resize', ()=>{ if(!tipsOverlay.hidden) renderStep(); });

  // ---- scratchpad: notes + basic calculator (two independent panels) ----
  const notesUnit = document.getElementById('notesUnit');
  const notesToggle = document.getElementById('notesToggle');
  const notesBody = document.getElementById('notesBody');
  const notesField = document.getElementById('notesField');

  const calcUnit = document.getElementById('calcUnit');
  const calcToggle = document.getElementById('calcToggle');
  const calcBody = document.getElementById('calcBody');
  const calcHistoryEl = document.getElementById('calcHistory');
  const calcDisplay = document.getElementById('calcDisplay');
  const calcOps = document.getElementById('calcOps');
  const calcClearBtn = document.getElementById('calcClearBtn');

  const SCRATCH_KEY = 'musical-calc-scratchpad';
  const CALC_HISTORY_MAX = 6;
  let calcHistory = [];
  let calcPrev = null;
  let calcOp = null;
  let calcNewEntry = false;

  let scratchSaveTimer = null;
  function saveScratchState(){
    clearTimeout(scratchSaveTimer);
    scratchSaveTimer = setTimeout(async ()=>{
      const payload = JSON.stringify({ history: calcHistory, notes: notesField.value });
      try{
        if(window.storage){ await window.storage.set(SCRATCH_KEY, payload); }
        else{ localStorage.setItem(SCRATCH_KEY, payload); }
      }catch(e){ /* storage unavailable — fail silently, no persistence this session */ }
    }, 300);
  }
  async function loadScratchState(){
    try{
      if(window.storage){
        const res = await window.storage.get(SCRATCH_KEY);
        return res ? JSON.parse(res.value) : null;
      }
      const raw = localStorage.getItem(SCRATCH_KEY);
      return raw ? JSON.parse(raw) : null;
    }catch(e){ return null; }
  }

  function formatCalcNum(n){
    if(!isFinite(n)) return 'Err';
    const rounded = Math.round(n * 1e9) / 1e9;
    return String(rounded);
  }

  function renderCalcHistory(){
    calcHistoryEl.innerHTML = '';
    calcHistory.forEach((val, i)=>{
      const row = document.createElement('div');
      row.className = 'calc-row';
      row.textContent = val;
      const t = calcHistory.length > 1 ? i / (calcHistory.length - 1) : 1;
      row.style.opacity = String(0.28 + t * 0.42);
      calcHistoryEl.appendChild(row);
    });
  }

  function pushCalcHistory(val){
    calcHistory.push(val);
    if(calcHistory.length > CALC_HISTORY_MAX) calcHistory.shift();
    renderCalcHistory();
  }

  function calcCompute(a, b, op){
    switch(op){
      case '+': return a + b;
      case '-': return a - b;
      case '*': return a * b;
      case '/': return b === 0 ? NaN : a / b;
      default: return b;
    }
  }
  function calcOpSymbol(op){
    switch(op){
      case '+': return '+';
      case '-': return '−';
      case '*': return '×';
      case '/': return '÷';
      default: return op;
    }
  }

  // calcDisplay is a real text input: typing (keyboard) and pasting (ctrl+v)
  // both just edit its value natively. We only intervene on operator/equals
  // presses, and to select-all on focus so a click/tap-in — or the next typed
  // digit after an operator — cleanly replaces the shown value.
  calcDisplay.addEventListener('focus', ()=>{ setTimeout(()=>calcDisplay.select(), 0); });
  calcDisplay.addEventListener('click', ()=>{ setTimeout(()=>calcDisplay.select(), 0); });
  calcDisplay.addEventListener('input', ()=>{ calcNewEntry = false; });
  calcDisplay.addEventListener('keydown', (e)=>{
    if(e.key === 'Enter'){ e.preventDefault(); calcPressEquals(); }
  });

  function calcPressOp(op){
    const val = evalMathExpression(calcDisplay.value);
    const safeVal = isFinite(val) ? val : 0;
    if(calcOp && !calcNewEntry){
      calcPrev = calcCompute(calcPrev, safeVal, calcOp);
      calcDisplay.value = formatCalcNum(calcPrev);
    }else{
      calcPrev = safeVal;
    }
    calcOp = op;
    calcNewEntry = true;
    calcDisplay.focus();
    calcDisplay.select();
  }
  function calcPressEquals(){
    // No operator chain pending: evaluate whatever expression is typed
    // directly (supports the full +-*/^() syntax, e.g. "12*(3+2)").
    if(calcOp == null){
      const raw = calcDisplay.value;
      if(!/[+\-*/^()]/.test(raw)) return;
      const out = formatCalcNum(evalMathExpression(raw));
      pushCalcHistory(`${raw} = ${out}`);
      calcDisplay.value = out;
      calcDisplay.focus();
      calcDisplay.select();
      saveScratchState();
      return;
    }
    const leftOperand = calcPrev;
    const op = calcOp;
    const val = evalMathExpression(calcDisplay.value);
    const rightOperand = isFinite(val) ? val : NaN;
    const result = calcCompute(leftOperand, rightOperand, op);
    const out = formatCalcNum(result);
    const equation = `${formatCalcNum(leftOperand)} ${calcOpSymbol(op)} ${formatCalcNum(rightOperand)} = ${out}`;
    pushCalcHistory(equation);
    calcDisplay.value = out;
    calcPrev = null;
    calcOp = null;
    calcNewEntry = true;
    calcDisplay.focus();
    calcDisplay.select();
    saveScratchState();
  }
  function calcClear(){
    calcDisplay.value = '0';
    calcPrev = null;
    calcOp = null;
    calcNewEntry = false;
    calcDisplay.focus();
  }

  calcOps.addEventListener('click', (e)=>{
    const btn = e.target.closest('.calc-btn');
    if(!btn) return;
    const k = btn.dataset.k;
    if(k === '=') calcPressEquals();
    else calcPressOp(k);
  });
  calcClearBtn.addEventListener('click', calcClear);

  function bindScratchToggle(toggleBtn, panelUnit, bodyEl){
    panelUnit.addEventListener('click', (e)=>{
      const isOpen = panelUnit.classList.contains('open');
      if(isOpen && !toggleBtn.contains(e.target)) return;
      const open = panelUnit.classList.toggle('open');
      bodyEl.hidden = !open;
      toggleBtn.setAttribute('aria-expanded', String(open));
    });
  }
  bindScratchToggle(notesToggle, notesUnit, notesBody);
  bindScratchToggle(calcToggle, calcUnit, calcBody);

  notesField.addEventListener('input', saveScratchState);

  // ---- init ----
  (async function init(){
    const saved = await loadState();
    if(saved){
      if(saved.bpm>0){ bpm = saved.bpm; bpmInput.value = round(bpm, 2); }
      if(saved.sampleRate>0){ sampleRate = saved.sampleRate; sampleRateSelect.value = String(sampleRate); }
      if(saved.a4>0){ a4 = saved.a4; a4Select.value = String(a4); }
      if(typeof saved.bpmLocked === 'boolean'){ bpmLocked = saved.bpmLocked; renderLockBtn(); }
    }
    if(saved && saved.ms>0){
      pushMs(saved.ms);
    }else{
      pushMs(msFromTempo(bpm, 4, 'straight'));
    }
    if(!(await hasTipsSeen())){
      setTimeout(showTips, 600);
    }
    const scratchSaved = await loadScratchState();
    if(scratchSaved){
      if(Array.isArray(scratchSaved.history)){
        calcHistory = scratchSaved.history.slice(-CALC_HISTORY_MAX);
        renderCalcHistory();
      }
      if(typeof scratchSaved.notes === 'string'){ notesField.value = scratchSaved.notes; }
    }
  })();
})();
</script>

</body>
</html>
